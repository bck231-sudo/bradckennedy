[[redirects]]
  from = "/server/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tests/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/assets/*"
  to = "/public/assets/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true
