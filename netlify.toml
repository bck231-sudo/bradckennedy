[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "https://www.adhdagenda.com/*"
  to = "https://adhdagenda.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/server/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/docs/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/tests/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/app/*"
  to = "/app/index.html"
  status = 200

[[redirects]]
  from = "/tracker"
  to = "/app"
  status = 301
  force = true

[[redirects]]
  from = "/tracker/*"
  to = "/app/index.html"
  status = 200
