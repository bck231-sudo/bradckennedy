<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medication Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #17212f;
      --muted: #5f6b7a;
      --accent: #0f7b70;
      --accent-soft: #def6f3;
      --danger: #c83e3e;
      --danger-soft: #fdeaea;
      --border: #d9e1e8;
      --shadow: 0 20px 40px rgba(23, 33, 47, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "DM Sans", "Avenir Next", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 100% 0%, #c8efe9 0%, rgba(200, 239, 233, 0) 45%),
        radial-gradient(circle at 0% 100%, #fbe5cd 0%, rgba(251, 229, 205, 0) 35%),
        var(--bg);
      min-height: 100vh;
      padding: 24px;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 18px;
    }

    .sidebar,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 18px;
      position: sticky;
      top: 24px;
      align-self: start;
    }

    .brand {
      margin-bottom: 14px;
    }

    .brand h1 {
      font-family: "Sora", "Futura", sans-serif;
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.02em;
    }

    .brand p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .nav {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .nav button {
      border: 1px solid var(--border);
      background: #f8fafc;
      color: var(--ink);
      border-radius: 12px;
      padding: 10px 12px;
      text-align: left;
      font: inherit;
      cursor: pointer;
      transition: 120ms ease;
    }

    .nav button:hover {
      transform: translateY(-1px);
      border-color: #9db4cb;
    }

    .nav button.active {
      background: var(--accent-soft);
      border-color: #7ecfc4;
      color: #0d625a;
      font-weight: 700;
    }

    .panel {
      padding: 18px;
      overflow: hidden;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .header h2 {
      font-family: "Sora", "Futura", sans-serif;
      margin: 0;
      font-size: 1.3rem;
    }

    .header p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pill {
      background: #ecf1f6;
      color: #38506b;
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .tab {
      display: none;
      animation: fade 160ms ease;
    }

    .tab.active {
      display: block;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .banner {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #f0ca9c;
      background: #fff6eb;
      color: #6c4c21;
      display: none;
    }

    .banner.show {
      display: block;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #fbfdff;
    }

    .card h3 {
      margin: 0;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #4d6279;
    }

    .card strong {
      display: block;
      margin-top: 6px;
      font-size: 1.4rem;
      color: #11243a;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
    }

    th,
    td {
      border-bottom: 1px solid var(--border);
      text-align: left;
      padding: 9px 8px;
      font-size: 0.92rem;
      vertical-align: top;
    }

    th {
      color: #46617c;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: #f8fbff;
    }

    .muted {
      color: var(--muted);
    }

    .empty {
      border: 1px dashed #c4d2df;
      border-radius: 12px;
      padding: 14px;
      color: var(--muted);
      background: #fbfdff;
      margin-top: 8px;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .note-box {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
    }

    .note-box h3 {
      margin: 0;
      font-size: 1rem;
    }

    .note-item {
      border-top: 1px solid #e8edf3;
      margin-top: 10px;
      padding-top: 10px;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .note-item:first-of-type {
      margin-top: 8px;
    }

    .severity {
      font-size: 0.78rem;
      border-radius: 999px;
      padding: 4px 8px;
      border: 1px solid #e5edf7;
      background: #f7faff;
      color: #4c627a;
      display: inline-block;
      margin-top: 6px;
    }

    .severity.high {
      background: var(--danger-soft);
      border-color: #f7b4b4;
      color: #8f2323;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    label {
      display: block;
      font-size: 0.84rem;
      color: #48617d;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input,
    select,
    textarea,
    button {
      font: inherit;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #c8d5e2;
      border-radius: 10px;
      padding: 10px;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn.primary {
      background: linear-gradient(120deg, #0f7b70, #1e9d8f);
      color: #fff;
    }

    .btn.secondary {
      background: #eff5fa;
      color: #24445f;
      border: 1px solid #cfdae5;
    }

    .btn.warn {
      background: #fff3f3;
      color: #a12c2c;
      border: 1px solid #edb8b8;
    }

    .status {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #0d625a;
      min-height: 1.2em;
    }

    .share-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .share-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: #fbfdff;
    }

    .share-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .share-url {
      width: 100%;
      margin-top: 8px;
      font-size: 0.82rem;
      min-height: 62px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }

      .nav {
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>Medication Tracker</h1>
        <p>Track medications, dose changes, outcomes, and weekly trends in one place.</p>
      </div>
      <div class="nav" id="nav"></div>
    </aside>

    <section class="panel">
      <div id="readOnlyBanner" class="banner"></div>
      <div class="header">
        <div>
          <h2 id="pageTitle">Current Medications</h2>
          <p id="pageSubtitle">Active medications with dose and time.</p>
        </div>
        <div class="pill" id="modePill">Owner mode</div>
      </div>

      <section class="tab" data-tab="meds">
        <div id="medCards" class="cards"></div>
        <div id="medTableWrap"></div>
      </section>

      <section class="tab" data-tab="changes">
        <div id="changeTableWrap"></div>
      </section>

      <section class="tab" data-tab="notes">
        <div id="notesWrap"></div>
      </section>

      <section class="tab" data-tab="weekly">
        <div id="weeklyWrap"></div>
      </section>

      <section class="tab" data-tab="add">
        <form id="entryForm">
          <div class="field-grid">
            <div>
              <label for="entryType">Entry type</label>
              <select id="entryType" name="entryType" required>
                <option value="medication">Current medication</option>
                <option value="change">Medication change</option>
                <option value="note">Effects / side effects note</option>
              </select>
            </div>
          </div>

          <div id="entryFields" class="field-grid"></div>

          <div class="actions">
            <button class="btn primary" type="submit">Add entry</button>
            <button class="btn secondary" type="button" id="clearForm">Clear form</button>
          </div>
          <div class="status" id="formStatus"></div>
        </form>
      </section>

      <section class="tab" data-tab="share">
        <form id="shareForm">
          <div class="field-grid">
            <div>
              <label for="shareName">Person name</label>
              <input id="shareName" name="shareName" placeholder="Dr Smith" required>
            </div>
            <div>
              <label for="shareEmail">Email (optional)</label>
              <input id="shareEmail" name="shareEmail" placeholder="doctor@example.com">
            </div>
          </div>
          <div class="actions">
            <button class="btn primary" type="submit">Create read-only link</button>
          </div>
          <p class="muted">Each link is read-only and tied to one person label. Create separate links for each person you share with.</p>
          <div class="status" id="shareStatus"></div>
        </form>
        <div id="shareList" class="share-list"></div>
      </section>
    </section>
  </div>

  <script>
    const STORAGE_KEY = "medication_tracker_data_v1";
    const TAB_CONFIG = [
      { id: "meds", label: "Current Meds", title: "Current Medications", subtitle: "Active medications with dose and time." },
      { id: "changes", label: "Change Log", title: "Medication Change Log", subtitle: "Date, change details, and reason." },
      { id: "notes", label: "Effects Notes", title: "Effects & Side Effects", subtitle: "Capture what is helping and what is difficult." },
      { id: "weekly", label: "Weekly Summary", title: "Weekly Summary", subtitle: "7-day snapshot of meds, changes, and notes." },
      { id: "add", label: "Add Entry", title: "Add Entry", subtitle: "Quickly add meds, changes, or effects notes." },
      { id: "share", label: "Share Read-Only", title: "Share Read-Only", subtitle: "Create simple read-only links for specific people." }
    ];

    const defaultData = {
      medications: [
        {
          id: crypto.randomUUID(),
          name: "Vyvanse",
          dose: "40 mg",
          time: "08:00",
          notes: "Morning dose",
          status: "active",
          createdAt: new Date().toISOString(),
          updatedAt: new Date().toISOString()
        }
      ],
      changes: [],
      notes: [],
      shareLinks: []
    };

    let state = loadData();
    let activeTab = "meds";
    let readOnlyPayload = null;

    function applyModeFromLocation() {
      const payload = parseSharePayload();
      if (payload) {
        readOnlyPayload = payload;
        state = {
          medications: payload.data.medications || [],
          changes: payload.data.changes || [],
          notes: payload.data.notes || [],
          shareLinks: []
        };
      } else {
        readOnlyPayload = null;
        state = loadData();
      }
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return structuredClone(defaultData);
      }
      try {
        const parsed = JSON.parse(raw);
        return {
          medications: Array.isArray(parsed.medications) ? parsed.medications : [],
          changes: Array.isArray(parsed.changes) ? parsed.changes : [],
          notes: Array.isArray(parsed.notes) ? parsed.notes : [],
          shareLinks: Array.isArray(parsed.shareLinks) ? parsed.shareLinks : []
        };
      } catch (_error) {
        return structuredClone(defaultData);
      }
    }

    function saveData() {
      if (readOnlyPayload) {
        return;
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function parseSharePayload() {
      const hash = window.location.hash || "";
      if (!hash.startsWith("#share=")) {
        return null;
      }
      try {
        const encoded = decodeURIComponent(hash.slice("#share=".length));
        const decoded = decodeURIComponent(escape(atob(encoded)));
        const payload = JSON.parse(decoded);
        if (!payload || !payload.data) {
          return null;
        }
        return payload;
      } catch (_error) {
        return null;
      }
    }

    function getToday() {
      return new Date().toISOString().slice(0, 10);
    }

    function niceDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    }

    function niceDateTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return date.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = "";
      TAB_CONFIG.forEach((tab) => {
        if (readOnlyPayload && (tab.id === "add" || tab.id === "share")) {
          return;
        }
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = tab.label;
        button.className = tab.id === activeTab ? "active" : "";
        button.addEventListener("click", () => {
          activeTab = tab.id;
          render();
        });
        nav.appendChild(button);
      });
    }

    function renderHeader() {
      const current = TAB_CONFIG.find((tab) => tab.id === activeTab) || TAB_CONFIG[0];
      document.getElementById("pageTitle").textContent = current.title;
      document.getElementById("pageSubtitle").textContent = current.subtitle;

      const modePill = document.getElementById("modePill");
      const banner = document.getElementById("readOnlyBanner");
      if (readOnlyPayload) {
        modePill.textContent = "Read-only shared view";
        banner.className = "banner show";
        const recipientName = readOnlyPayload.recipient?.name || "shared person";
        const createdAt = niceDateTime(readOnlyPayload.createdAt);
        banner.innerHTML = `<strong>Read-only access:</strong> Shared for ${escapeHtml(recipientName)} on ${escapeHtml(createdAt)}.`;
      } else {
        modePill.textContent = "Owner mode";
        banner.className = "banner";
        banner.textContent = "";
      }
    }

    function renderTabs() {
      document.querySelectorAll(".tab").forEach((node) => {
        node.classList.toggle("active", node.dataset.tab === activeTab);
      });
    }

    function renderMeds() {
      const activeMeds = state.medications
        .filter((item) => item.status === "active")
        .sort((a, b) => a.name.localeCompare(b.name));

      const cards = document.getElementById("medCards");
      cards.innerHTML = `
        <article class="card">
          <h3>Active medications</h3>
          <strong>${activeMeds.length}</strong>
        </article>
        <article class="card">
          <h3>Total change entries</h3>
          <strong>${state.changes.length}</strong>
        </article>
        <article class="card">
          <h3>Effects notes</h3>
          <strong>${state.notes.filter((item) => item.type === "effect").length}</strong>
        </article>
        <article class="card">
          <h3>Side effects notes</h3>
          <strong>${state.notes.filter((item) => item.type === "side_effect").length}</strong>
        </article>
      `;

      const wrap = document.getElementById("medTableWrap");
      if (!activeMeds.length) {
        wrap.innerHTML = `<div class="empty">No active medications yet. Use <strong>Add Entry</strong> to add your first medication.</div>`;
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Medication</th>
              <th>Dose</th>
              <th>Time</th>
              <th>Notes</th>
              <th>Updated</th>
              ${readOnlyPayload ? "" : "<th>Action</th>"}
            </tr>
          </thead>
          <tbody>
            ${activeMeds.map((item) => `
              <tr>
                <td>${escapeHtml(item.name)}</td>
                <td>${escapeHtml(item.dose || "-")}</td>
                <td>${escapeHtml(item.time || "-")}</td>
                <td>${escapeHtml(item.notes || "-")}</td>
                <td>${escapeHtml(niceDateTime(item.updatedAt))}</td>
                ${readOnlyPayload ? "" : `<td><button class="btn secondary" data-archive-med="${item.id}">Mark inactive</button></td>`}
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;

      if (!readOnlyPayload) {
        wrap.querySelectorAll("[data-archive-med]").forEach((button) => {
          button.addEventListener("click", () => {
            const id = button.getAttribute("data-archive-med");
            const found = state.medications.find((item) => item.id === id);
            if (!found) return;
            found.status = "inactive";
            found.updatedAt = new Date().toISOString();
            saveData();
            render();
          });
        });
      }
    }

    function renderChangeLog() {
      const rows = [...state.changes].sort((a, b) => (a.date < b.date ? 1 : -1));
      const wrap = document.getElementById("changeTableWrap");
      if (!rows.length) {
        wrap.innerHTML = `<div class="empty">No medication changes recorded yet.</div>`;
        return;
      }

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Medication</th>
              <th>Change</th>
              <th>Reason</th>
              <th>Logged</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((item) => `
              <tr>
                <td>${escapeHtml(niceDate(item.date))}</td>
                <td>${escapeHtml(item.medication || "-")}</td>
                <td>${escapeHtml(item.change || "-")}</td>
                <td>${escapeHtml(item.reason || "-")}</td>
                <td>${escapeHtml(niceDateTime(item.createdAt))}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderNotes() {
      const effects = state.notes.filter((item) => item.type === "effect").sort((a, b) => (a.date < b.date ? 1 : -1));
      const sideEffects = state.notes.filter((item) => item.type === "side_effect").sort((a, b) => (a.date < b.date ? 1 : -1));
      const wrap = document.getElementById("notesWrap");

      if (!effects.length && !sideEffects.length) {
        wrap.innerHTML = `<div class="empty">No effects notes yet. Add entries as you monitor progress.</div>`;
        return;
      }

      const renderNoteBlock = (items, title) => {
        if (!items.length) {
          return `<article class="note-box"><h3>${title}</h3><p class="muted">No notes yet.</p></article>`;
        }

        return `
          <article class="note-box">
            <h3>${title}</h3>
            ${items.map((item) => `
              <div class="note-item">
                <div><strong>${escapeHtml(item.medication || "General")}</strong> · ${escapeHtml(niceDate(item.date))}</div>
                <div>${escapeHtml(item.note || "")}</div>
                <span class="severity ${item.severity === "high" ? "high" : ""}">Severity: ${escapeHtml(item.severity || "moderate")}</span>
              </div>
            `).join("")}
          </article>
        `;
      };

      wrap.innerHTML = `
        <div class="notes-grid">
          ${renderNoteBlock(effects, "Effects")}
          ${renderNoteBlock(sideEffects, "Side Effects")}
        </div>
      `;
    }

    function renderWeekly() {
      const wrap = document.getElementById("weeklyWrap");
      const now = new Date();
      const weekStart = new Date(now);
      weekStart.setDate(now.getDate() - 6);
      weekStart.setHours(0, 0, 0, 0);

      const inWeek = (value) => {
        const date = new Date(value);
        return !Number.isNaN(date.getTime()) && date >= weekStart;
      };

      const weeklyChanges = state.changes.filter((item) => inWeek(item.date || item.createdAt));
      const weeklyNotes = state.notes.filter((item) => inWeek(item.date || item.createdAt));
      const effectCount = weeklyNotes.filter((item) => item.type === "effect").length;
      const sideEffectCount = weeklyNotes.filter((item) => item.type === "side_effect").length;
      const activeMeds = state.medications.filter((item) => item.status === "active");

      const timeline = [
        ...weeklyChanges.map((item) => ({
          date: item.date || item.createdAt,
          title: `${item.medication || "Medication"}: ${item.change || "change logged"}`,
          detail: `Reason: ${item.reason || "-"}`
        })),
        ...weeklyNotes.map((item) => ({
          date: item.date || item.createdAt,
          title: `${item.medication || "General"}: ${item.type === "effect" ? "effect" : "side effect"} note`,
          detail: item.note || ""
        }))
      ].sort((a, b) => new Date(b.date) - new Date(a.date));

      wrap.innerHTML = `
        <div class="cards">
          <article class="card">
            <h3>Active meds</h3>
            <strong>${activeMeds.length}</strong>
          </article>
          <article class="card">
            <h3>Changes this week</h3>
            <strong>${weeklyChanges.length}</strong>
          </article>
          <article class="card">
            <h3>Effects this week</h3>
            <strong>${effectCount}</strong>
          </article>
          <article class="card">
            <h3>Side effects this week</h3>
            <strong>${sideEffectCount}</strong>
          </article>
        </div>

        <div class="card">
          <h3>Weekly narrative</h3>
          <p class="muted">
            Over the last 7 days, you tracked <strong>${weeklyChanges.length}</strong> medication changes and
            <strong>${weeklyNotes.length}</strong> effect notes. Active medications currently listed: ${activeMeds.map((item) => escapeHtml(item.name)).join(", ") || "none"}.
          </p>
        </div>

        ${timeline.length ? `
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Event</th>
                <th>Detail</th>
              </tr>
            </thead>
            <tbody>
              ${timeline.map((item) => `
                <tr>
                  <td>${escapeHtml(niceDate(item.date))}</td>
                  <td>${escapeHtml(item.title)}</td>
                  <td>${escapeHtml(item.detail)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        ` : `<div class="empty">No events in the last 7 days yet.</div>`}
      `;
    }

    function renderShareLinks() {
      const wrap = document.getElementById("shareList");
      if (readOnlyPayload) {
        wrap.innerHTML = "";
        return;
      }
      if (!state.shareLinks.length) {
        wrap.innerHTML = `<div class="empty">No share links yet.</div>`;
        return;
      }

      wrap.innerHTML = state.shareLinks
        .slice()
        .reverse()
        .map((item) => `
          <article class="share-item">
            <strong>${escapeHtml(item.name)}</strong>
            <div class="muted">${escapeHtml(item.email || "No email provided")} · Created ${escapeHtml(niceDateTime(item.createdAt))}</div>
            <textarea class="share-url" readonly>${escapeHtml(item.url)}</textarea>
            <div class="actions">
              <button class="btn secondary" type="button" data-copy-share="${item.id}">Copy link</button>
              <button class="btn warn" type="button" data-delete-share="${item.id}">Delete</button>
            </div>
          </article>
        `)
        .join("");

      wrap.querySelectorAll("[data-copy-share]").forEach((button) => {
        button.addEventListener("click", async () => {
          const id = button.getAttribute("data-copy-share");
          const found = state.shareLinks.find((item) => item.id === id);
          if (!found) return;
          await navigator.clipboard.writeText(found.url);
          const shareStatus = document.getElementById("shareStatus");
          shareStatus.textContent = `Copied link for ${found.name}.`;
        });
      });

      wrap.querySelectorAll("[data-delete-share]").forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.getAttribute("data-delete-share");
          state.shareLinks = state.shareLinks.filter((item) => item.id !== id);
          saveData();
          renderShareLinks();
        });
      });
    }

    function renderEntryFields() {
      const type = document.getElementById("entryType").value;
      const container = document.getElementById("entryFields");

      if (type === "medication") {
        container.innerHTML = `
          <div>
            <label for="medName">Medication name</label>
            <input id="medName" name="medName" required>
          </div>
          <div>
            <label for="medDose">Dose</label>
            <input id="medDose" name="medDose" placeholder="e.g., 20 mg" required>
          </div>
          <div>
            <label for="medTime">Time</label>
            <input id="medTime" name="medTime" type="time" required>
          </div>
          <div>
            <label for="medStatus">Status</label>
            <select id="medStatus" name="medStatus">
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
            </select>
          </div>
          <div style="grid-column: 1 / -1;">
            <label for="medNotes">Notes</label>
            <textarea id="medNotes" name="medNotes" placeholder="Optional notes"></textarea>
          </div>
        `;
      }

      if (type === "change") {
        container.innerHTML = `
          <div>
            <label for="changeDate">Date</label>
            <input id="changeDate" name="changeDate" type="date" value="${getToday()}" required>
          </div>
          <div>
            <label for="changeMedication">Medication</label>
            <input id="changeMedication" name="changeMedication" required>
          </div>
          <div style="grid-column: 1 / -1;">
            <label for="changeText">Change</label>
            <textarea id="changeText" name="changeText" placeholder="What changed?" required></textarea>
          </div>
          <div style="grid-column: 1 / -1;">
            <label for="changeReason">Reason</label>
            <textarea id="changeReason" name="changeReason" placeholder="Why was the change made?" required></textarea>
          </div>
        `;
      }

      if (type === "note") {
        container.innerHTML = `
          <div>
            <label for="noteDate">Date</label>
            <input id="noteDate" name="noteDate" type="date" value="${getToday()}" required>
          </div>
          <div>
            <label for="noteMedication">Medication (optional)</label>
            <input id="noteMedication" name="noteMedication" placeholder="Optional">
          </div>
          <div>
            <label for="noteType">Type</label>
            <select id="noteType" name="noteType">
              <option value="effect">Effect</option>
              <option value="side_effect">Side effect</option>
            </select>
          </div>
          <div>
            <label for="noteSeverity">Severity</label>
            <select id="noteSeverity" name="noteSeverity">
              <option value="mild">Mild</option>
              <option value="moderate" selected>Moderate</option>
              <option value="high">High</option>
            </select>
          </div>
          <div style="grid-column: 1 / -1;">
            <label for="noteText">Note</label>
            <textarea id="noteText" name="noteText" placeholder="Describe what happened" required></textarea>
          </div>
        `;
      }
    }

    function createShareLink(name, email) {
      const payload = {
        version: 1,
        recipient: { name, email },
        createdAt: new Date().toISOString(),
        data: {
          medications: state.medications,
          changes: state.changes,
          notes: state.notes
        }
      };
      const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
      return `${window.location.origin}${window.location.pathname}#share=${encodeURIComponent(encoded)}`;
    }

    function bindForms() {
      const entryType = document.getElementById("entryType");
      const entryForm = document.getElementById("entryForm");
      const clearForm = document.getElementById("clearForm");
      const shareForm = document.getElementById("shareForm");

      if (entryType) {
        entryType.addEventListener("change", () => {
          renderEntryFields();
          document.getElementById("formStatus").textContent = "";
        });
      }

      if (entryForm) {
        entryForm.addEventListener("submit", (event) => {
          event.preventDefault();
          const formStatus = document.getElementById("formStatus");
          formStatus.textContent = "";
          const type = document.getElementById("entryType").value;
          const now = new Date().toISOString();

          if (type === "medication") {
            state.medications.push({
              id: crypto.randomUUID(),
              name: document.getElementById("medName").value.trim(),
              dose: document.getElementById("medDose").value.trim(),
              time: document.getElementById("medTime").value,
              status: document.getElementById("medStatus").value,
              notes: document.getElementById("medNotes").value.trim(),
              createdAt: now,
              updatedAt: now
            });
          }

          if (type === "change") {
            state.changes.push({
              id: crypto.randomUUID(),
              date: document.getElementById("changeDate").value,
              medication: document.getElementById("changeMedication").value.trim(),
              change: document.getElementById("changeText").value.trim(),
              reason: document.getElementById("changeReason").value.trim(),
              createdAt: now
            });
          }

          if (type === "note") {
            state.notes.push({
              id: crypto.randomUUID(),
              date: document.getElementById("noteDate").value,
              medication: document.getElementById("noteMedication").value.trim(),
              type: document.getElementById("noteType").value,
              severity: document.getElementById("noteSeverity").value,
              note: document.getElementById("noteText").value.trim(),
              createdAt: now
            });
          }

          saveData();
          formStatus.textContent = "Entry added.";
          entryForm.reset();
          document.getElementById("entryType").value = type;
          renderEntryFields();
          render();
        });
      }

      if (clearForm) {
        clearForm.addEventListener("click", () => {
          entryForm.reset();
          renderEntryFields();
          document.getElementById("formStatus").textContent = "Form cleared.";
        });
      }

      if (shareForm) {
        shareForm.addEventListener("submit", (event) => {
          event.preventDefault();
          const name = document.getElementById("shareName").value.trim();
          const email = document.getElementById("shareEmail").value.trim();
          const shareStatus = document.getElementById("shareStatus");
          shareStatus.textContent = "";

          if (!name) {
            shareStatus.textContent = "Please add a name.";
            return;
          }

          const url = createShareLink(name, email);
          const item = {
            id: crypto.randomUUID(),
            name,
            email,
            url,
            createdAt: new Date().toISOString()
          };

          state.shareLinks.push(item);
          saveData();
          shareForm.reset();
          shareStatus.textContent = `Read-only link created for ${name}.`;
          renderShareLinks();
        });
      }
    }

    function render() {
      renderNav();
      renderHeader();
      renderTabs();
      renderMeds();
      renderChangeLog();
      renderNotes();
      renderWeekly();
      renderShareLinks();
    }

    applyModeFromLocation();
    renderEntryFields();
    bindForms();
    render();

    window.addEventListener("hashchange", () => {
      applyModeFromLocation();
      activeTab = "meds";
      render();
    });
  </script>
</body>
</html>
