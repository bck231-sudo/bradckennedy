<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Medication Tracker</title>
  <meta name="description" content="Medication tracker for medications, dose changes, wellbeing check-ins, and shareable read-only views.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar panel">
      <div class="brand-block">
        <div class="brand-lockup">
          <div class="logo-mark" aria-hidden="true">MT</div>
          <div>
            <h1>Medication Tracker</h1>
            <p>Clinical daily tracking for medications, changes, outcomes, and weekly wellbeing trends.</p>
          </div>
        </div>
      </div>

      <div class="sidebar-control">
        <label for="viewerModeSegment">Viewer Context</label>
        <div id="viewerModeSegment" class="segmented-control" role="tablist" aria-label="Viewer context"></div>
        <select id="viewerModeSelect" class="hidden-native-control"></select>
      </div>

      <div class="sidebar-control">
        <label for="viewModeSelect">Data View</label>
        <select id="viewModeSelect"></select>
      </div>

      <div class="sidebar-control hidden" id="previewLinkControl">
        <label for="previewLinkSelect">Preview Shared Link</label>
        <select id="previewLinkSelect"></select>
      </div>

      <nav id="sectionNav" class="section-nav"></nav>

      <div class="sidebar-footnote">
        <p id="contextPill" class="pill">Owner View</p>
      </div>
    </aside>

    <main class="main panel">
      <header class="main-header">
        <div>
          <h2 id="sectionTitle">Dashboard</h2>
          <p id="sectionSubtitle">Today at a glance.</p>
        </div>
        <div class="header-actions">
          <button id="quickCheckinButton" class="btn btn-primary btn-large" type="button">Quick check-in</button>
        </div>
      </header>

      <div id="initialSkeleton" class="skeleton-shell">
        <div class="skeleton-row">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>

      <div id="readOnlyBanner" class="banner hidden"></div>
      <div id="globalStatus" class="status hidden"></div>

      <section id="section-dashboard" class="section"></section>
      <section id="section-medications" class="section hidden"></section>
      <section id="section-changes" class="section hidden"></section>
      <section id="section-checkins" class="section hidden"></section>
      <section id="section-notes" class="section hidden"></section>
      <section id="section-timeline" class="section hidden"></section>
      <section id="section-entry" class="section hidden"></section>
      <section id="section-sharing" class="section hidden"></section>
      <section id="section-exports" class="section hidden"></section>
    </main>

    <aside id="utilityPanel" class="utility panel"></aside>
  </div>

  <nav id="mobileNav" class="mobile-nav" aria-label="Mobile navigation"></nav>
  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>

  <div id="medicationModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="medModalTitle">
      <div class="modal-header">
        <h3 id="medModalTitle">Medication Details</h3>
        <button id="closeMedicationModal" type="button" class="icon-button" aria-label="Close">✕</button>
      </div>
      <div id="medicationModalBody" class="modal-body"></div>
    </div>
  </div>

  <datalist id="commonMedicationNames"></datalist>

  <script type="module" src="./app.js"></script>
</body>
</html>
