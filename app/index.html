<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bradley Kennedy's Medication Tracker - Daily Health Management</title>
  <meta name="description" content="A personal tool for tracking medications, doses, and wellbeing trends.">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Bradley Kennedy's Medication Tracker - Daily Health Management">
  <meta property="og:description" content="A personal tool for tracking medications, doses, and wellbeing trends.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bradckennedy.org/">
  <meta name="theme-color" content="#2c6eea">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="canonical" href="https://bradckennedy.org/">
  <link rel="icon" type="image/svg+xml" href="/site-icon.svg">
  <link rel="apple-touch-icon" href="/icons/icon-192-v2.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/styles.css?v=20260226-9">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Medication Tracker",
    "applicationCategory": "HealthApplication",
    "operatingSystem": "Web",
    "description": "A personal tool for tracking medications, doses, and wellbeing trends.",
    "url": "https://bradckennedy.org/"
  }
  </script>
</head>
<body>
  <a href="#section-dashboard" class="skip-link">Skip to main content</a>
  <header class="app-topbar panel">
    <div class="brand-lockup app-brand">
      <div class="logo-mark logo-mark-brand" aria-hidden="true">
        <svg class="logo-glyph" viewBox="0 0 64 64" fill="none">
          <defs>
            <linearGradient id="brandGlyphGrad" x1="12" y1="10" x2="52" y2="54" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#2D79F3"/>
              <stop offset="1" stop-color="#22C8D8"/>
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="22" fill="url(#brandGlyphGrad)" opacity="0.16"/>
          <rect x="18" y="24" width="28" height="16" rx="8" fill="none" stroke="url(#brandGlyphGrad)" stroke-width="3"/>
          <path d="M32 24V40" stroke="url(#brandGlyphGrad)" stroke-width="3" stroke-linecap="round"/>
          <path d="M12 32H19L23 27L28 36L34 22L39 32H52" stroke="#2D79F3" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="logo-monogram">BK</span>
      </div>
      <div class="brand-copy">
        <h1>Medication Tracker</h1>
        <p>Daily medications, wellbeing trends, and clean sharing views.</p>
      </div>
    </div>
  </header>

  <nav class="top-navbar navbar panel" aria-label="Primary navigation">
    <div id="topNavLinks" class="top-navbar-nav nav nav-pills">
      <button type="button" class="top-nav-link nav-link active" data-topnav-id="dashboard" aria-label="Open dashboard">Dashboard</button>
      <button type="button" class="top-nav-link nav-link" data-topnav-id="consult" aria-label="Open consult">Consult</button>
      <button type="button" class="top-nav-link nav-link" data-topnav-id="history" aria-label="Open history">History</button>
      <button type="button" class="top-nav-link nav-link" data-topnav-id="settings" aria-label="Open settings">Settings</button>
      <button type="button" class="top-nav-link nav-link" data-topnav-id="share" aria-label="Open sharing">Share</button>
    </div>
  </nav>

  <div class="layout">
    <aside class="sidebar panel">
      <nav id="sectionNav" class="section-nav"></nav>

      <div class="sidebar-footnote">
        <p id="contextPill" class="pill">My View</p>
      </div>
    </aside>

    <main id="mainContent" class="main panel">
      <header class="main-header">
        <div class="main-header-meta">
          <h2 id="sectionTitle">Dashboard</h2>
          <p id="sectionSubtitle">Today at a glance.</p>
          <div class="header-mode-control">
            <label for="viewerModeSegment">Mode</label>
            <div id="viewerModeSegment" class="segmented-control segmented-control-header" role="tablist" aria-label="Viewer context"></div>
            <select id="viewerModeSelect" class="hidden-native-control"></select>
            <select id="viewModeSelect" class="hidden-native-control"></select>
          </div>
          <div id="previewLinkControl" class="hidden" aria-hidden="true">
            <select id="previewLinkSelect" class="hidden-native-control"></select>
          </div>
        </div>
        <div class="header-actions">
          <span id="roleBadge" class="role-badge is-owner" aria-live="polite">Owner</span>
          <button id="installAppButton" class="btn btn-ghost" type="button" hidden>Install app</button>
          <button id="addToConsultButton" class="btn btn-secondary" type="button">Add to Consult</button>
          <button id="quickCheckinButton" class="btn btn-primary btn-large" type="button">Quick check-in</button>
        </div>
      </header>

      <div id="initialSkeleton" class="skeleton-shell">
        <div class="skeleton-row">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>

      <div id="readOnlyBanner" class="banner hidden"></div>
      <div id="offlineBanner" class="banner banner-offline hidden" aria-live="polite"></div>
      <div id="globalStatus" class="status hidden"></div>

      <section id="section-dashboard" class="section"></section>
      <section id="section-medications" class="section hidden"></section>
      <section id="section-education" class="section hidden"></section>
      <section id="section-changes" class="section hidden"></section>
      <section id="section-checkins" class="section hidden"></section>
      <section id="section-notes" class="section hidden"></section>
      <section id="section-consult" class="section hidden"></section>
      <section id="section-timeline" class="section hidden"></section>
      <section id="section-entry" class="section hidden"></section>
      <section id="section-sharing" class="section hidden"></section>
      <section id="section-exports" class="section hidden"></section>
    </main>

    <aside id="utilityPanel" class="utility panel"></aside>
  </div>

  <nav id="mobileNav" class="mobile-nav" aria-label="Mobile navigation"></nav>
  <div id="toastStack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>

  <div id="medicationModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="medModalTitle">
      <div class="modal-header">
        <h3 id="medModalTitle">Medication Details</h3>
        <button id="closeMedicationModal" type="button" class="icon-button" aria-label="Close" hidden>✕</button>
      </div>
      <div id="medicationModalBody" class="modal-body"></div>
    </div>
  </div>

  <datalist id="commonMedicationNames"></datalist>

  <script type="module" src="/app.js?v=20260226-9"></script>
</body>
</html>
