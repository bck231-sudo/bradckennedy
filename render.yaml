services:
  - type: web
    name: medication-tracker-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://adhdagenda.com,https://www.adhdagenda.com
      - key: MT_DATA_DIR
        value: /var/data/medication-tracker
      - key: MT_ENCRYPTION_KEY
        sync: false
      - key: MT_SESSION_TTL_DAYS
        value: "30"
      - key: MT_SESSION_COOKIE_SAMESITE
        value: none
      - key: MT_INVITE_TTL_DAYS
        value: "14"
    disk:
      name: medication-tracker-data
      mountPath: /var/data
      sizeGB: 1
