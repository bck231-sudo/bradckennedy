<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | AdhdAgenda</title>
  <meta name="description" content="Log in to your private AdhdAgenda workspace.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://adhdagenda.com/login/">
  <link rel="icon" type="image/svg+xml" href="/site-icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/site.css?v=20260311-repo-cleanup-1">
  <link rel="stylesheet" href="/assets/public-pages.css?v=20260324-new-pages-1">
</head>
<body class="public-page public-dark-page">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <!-- Particles -->
  <div class="dp-particles" aria-hidden="true">
    <span class="d1"></span><span class="d2"></span><span class="d3"></span>
    <span class="d4"></span><span class="d5"></span><span class="d6"></span>
    <span class="d7"></span><span class="d8"></span><span class="d9"></span>
    <span class="d10"></span>
  </div>

  <!-- Nav (login page shows Login button in active state) -->
  <header class="dp-header" role="banner">
    <nav class="dp-nav container" aria-label="Primary">
      <div class="dp-nav-links">
        <a href="/">Home</a>
        <a href="/get-started/">Get Started</a>
      </div>
      <a class="dp-nav-login" href="/login/" aria-current="page">Login</a>
    </nav>
  </header>

  <main id="main-content" tabindex="-1">
    <div class="dp-content">
      <p class="dp-page-label">LOGIN PAGE</p>

      <!-- Brand lockup -->
      <div class="dp-brand-lockup" style="margin-top: 8px;">
        <svg aria-hidden="true" viewBox="0 0 40 44" fill="none"><defs><clipPath id="nL"><rect x="0" y="0" width="20" height="44"/></clipPath><clipPath id="nR"><rect x="20" y="0" width="20" height="44"/></clipPath></defs><path d="M20 3 L3 41 H9.5 L13 32 H27 L30.5 41 H37 L20 3 Z M15.5 26 L20 14 L24.5 26 Z" clip-path="url(#nL)" fill="#5bbf9a" fill-rule="evenodd"/><path d="M20 3 L3 41 H9.5 L13 32 H27 L30.5 41 H37 L20 3 Z M15.5 26 L20 14 L24.5 26 Z" clip-path="url(#nR)" fill="none" stroke="#5bbf9a" stroke-width="2" fill-rule="evenodd"/></svg>
        <span class="dp-brand-lockup-name"><span class="brand-adhd">Adhd</span><span class="brand-agenda">Agenda</span></span>
      </div>

      <h1 class="dp-title">Log in to open your private workspace</h1>
      <p class="dp-subtitle">Use your secure account to access the AdhdAgenda app.</p>

      <!-- TODO: Wire form action to project's existing auth/login endpoint -->
      <form class="dp-form" action="/app/" method="get">
        <div class="dp-input-wrap">
          <svg viewBox="0 0 24 24" fill="none"><path d="M9 11l3 3 5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="2"/></svg>
          <input type="email" name="email" placeholder="Email" autocomplete="email" required>
        </div>
        <div class="dp-input-wrap">
          <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="10" rx="2" stroke="currentColor" stroke-width="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <input type="password" name="password" placeholder="Password" autocomplete="current-password" required>
        </div>
        <button class="dp-cta" type="submit">Log in</button>
        <div class="dp-form-links">
          <!-- TODO: Wire to actual signup flow when backend is ready -->
          <a href="/get-started/">Create account</a>
          <span class="dp-divider">|</span>
          <!-- TODO: Wire to actual password reset flow when backend is ready -->
          <a href="/contact/">Reset password</a>
        </div>
      </form>
    </div>
  </main>
</body>
</html>
