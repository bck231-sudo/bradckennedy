<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Manrope, system-ui, sans-serif;
        background: linear-gradient(180deg, #e8f1f8 0%, #d6e4ef 100%);
        color: #173454;
      }

      main {
        max-width: 520px;
        padding: 32px;
        border: 1px solid rgba(23, 52, 84, 0.12);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(39, 83, 119, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 5vw, 2.75rem);
        line-height: 1;
      }

      p {
        margin: 0;
        font-size: 1rem;
        line-height: 1.6;
        color: rgba(23, 52, 84, 0.78);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p>The page you requested is not available on this site.</p>
    </main>
  </body>
</html>
